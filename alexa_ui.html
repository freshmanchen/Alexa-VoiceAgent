<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexa 智能管家 - 桌面宽屏版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');
        
        :root {
            --primary-purple: #8B5CF6;
            --primary-light: #C4B5FD;
            --dark-purple: #4C1D95;
            --text-main: #2E1065;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.8);
        }

        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: #f3f0ff; 
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        /* 桌面级宽屏主容器 */
        .app-container {
            width: 900px; /* 宽屏尺寸 */
            height: 85vh; /* 适配屏幕高度 */
            max-height: 900px;
            border-radius: 35px;
            background: linear-gradient(135deg, #fdfbfe 0%, #f3ebff 100%);
            box-shadow: 0 30px 60px rgba(139, 92, 246, 0.15), 
                        inset 0 0 0 8px rgba(255, 255, 255, 0.8);
            position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* 背景光晕 */
        .app-container::before, .app-container::after {
            content: ''; position: absolute; border-radius: 50%; filter: blur(50px); z-index: 0;
        }
        .app-container::before { width: 300px; height: 300px; background: #d8b4fe; top: -50px; left: -50px; opacity: 0.5; }
        .app-container::after { width: 400px; height: 400px; background: #e9d5ff; bottom: -100px; right: -50px; opacity: 0.6; }

        /* 顶部毛玻璃导航栏 */
        .header {
            padding: 30px 40px 20px; z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .header-title { display: flex; flex-direction: row; align-items: center; gap: 20px; }
        .header h1 { margin: 0; font-size: 28px; font-weight: 800; color: var(--dark-purple); letter-spacing: -0.5px; }
        
        .status-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 14px; background: white; border-radius: 20px;
            font-size: 12px; font-weight: 600; color: var(--primary-purple);
            box-shadow: 0 4px 10px rgba(139, 92, 246, 0.1);
        }
        .status-dot { width: 8px; height: 8px; background-color: #10B981; border-radius: 50%; box-shadow: 0 0 8px #10B981; }

        /* 胶囊快捷栏 */
        .shortcut-scroll {
            padding: 20px 40px 10px; z-index: 10;
            display: flex; gap: 15px; overflow-x: auto;
            scrollbar-width: none;
        }
        .shortcut-pill {
            flex-shrink: 0; padding: 12px 22px;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            border: 1px solid white; border-radius: 30px;
            display: flex; align-items: center; gap: 10px;
            font-size: 14px; font-weight: 600; color: var(--text-main);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02); cursor: pointer; transition: 0.2s;
        }
        .shortcut-pill:hover { background: white; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139, 92, 246, 0.1); }
        .pill-icon { font-size: 18px; }

        /* 动态推荐卡片 */
        .insight-card {
            margin: 10px 40px; padding: 20px 25px; z-index: 10;
            background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.6) 100%);
            backdrop-filter: blur(15px); border-radius: 24px; border: 1px solid white;
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.08);
            display: flex; align-items: center; gap: 18px;
        }
        .insight-icon { width: 45px; height: 45px; border-radius: 14px; background: #F3E8FF; display: flex; justify-content: center; align-items: center; font-size: 22px; flex-shrink: 0; }
        .insight-text { font-size: 14px; color: var(--text-main); line-height: 1.6; font-weight: 600;}
        .insight-text span { font-weight: 400; color: #6B7280; display: block; font-size: 12px; margin-top: 4px;}

        /* 聊天区域 */
        .chat-area {
            flex: 1; padding: 25px 40px 140px; /* 底部留出足够空间给悬浮按钮 */
            overflow-y: auto; display: flex; flex-direction: column; gap: 20px; z-index: 10; scrollbar-width: none;
        }
        
        .bubble {
            max-width: 75%; /* 宽屏下气泡不宜过长，保持阅读舒适度 */
            padding: 16px 24px; border-radius: 24px;
            font-size: 15px; line-height: 1.7; font-weight: 600;
            position: relative; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .bubble.alexa {
            align-self: flex-start; background: white; color: var(--text-main);
            border-bottom-left-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }
        .bubble.user {
            align-self: flex-end; background: var(--primary-purple); color: white;
            border-bottom-right-radius: 8px; box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
        }

        /* 悬浮麦克风区域 */
        .fab-container {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 140px; z-index: 20;
            background: linear-gradient(to top, #fdfbfe 50%, rgba(253,251,254,0) 100%);
            display: flex; justify-content: center; align-items: flex-end; padding-bottom: 35px;
            pointer-events: none; 
        }

        .mic-btn {
            width: 80px; height: 80px; pointer-events: auto;
            background: linear-gradient(135deg, #A78BFA, var(--primary-purple));
            border-radius: 50%; border: none; color: white; font-size: 28px;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 15px 35px rgba(139, 92, 246, 0.4), inset 0 2px 5px rgba(255,255,255,0.4);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .mic-btn:active { transform: scale(0.9) translateY(4px); box-shadow: 0 5px 15px rgba(139, 92, 246, 0.3); }

        .mic-btn.listening {
            background: linear-gradient(135deg, #F59E0B, #D97706);
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes slideUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.5); transform: scale(0.98); }
            70% { box-shadow: 0 0 0 30px rgba(245, 158, 11, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); transform: scale(0.98); }
        }
    </style>
</head>
<body>
    <div class="app-container" id="app-container">
        <div class="header">
            <div class="header-title">
                <h1>Alexa</h1>
                <div class="status-badge" id="status-badge">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="status-text">正在连接核心...</span>
                </div>
            </div>
            <div style="font-size: 28px; opacity: 0.5; cursor:pointer;">🔮</div>
        </div>
        
        <div class="shortcut-scroll">
            <div class="shortcut-pill"><span class="pill-icon">☀️</span> 今日天气</div>
            <div class="shortcut-pill"><span class="pill-icon">📅</span> 我的日程</div>
            <div class="shortcut-pill"><span class="pill-icon">🎵</span> 放松歌单</div>
            <div class="shortcut-pill"><span class="pill-icon">⚙️</span> 系统设置</div>
        </div>
        
        <div class="insight-card">
            <div class="insight-icon">💡</div>
            <div class="insight-text">
                Alexa 建议
                <span>"你可以问我任何技术问题，或者让我帮你写一段 Python 代码。"</span>
            </div>
        </div>
        
        <div class="chat-area" id="chat-area">
            <div class="bubble alexa">你好呀！我是全新升级的 Alexa，随时准备为你服务。✨</div>
        </div>
        
        <div class="fab-container">
            <button class="mic-btn" id="mic-btn">🎤</button>
        </div>
    </div>

    <script>
    const micBtn = document.getElementById('mic-btn');
    const chatArea = document.getElementById('chat-area');
    const statusText = document.getElementById('status-text');
    const statusDot = document.getElementById('status-dot');
    
    const ws = new WebSocket("ws://127.0.0.1:8000/ws");

    // 用于流式打字气泡的引用
    let alexaTypingBubble = null;

    ws.onmessage = function(event) {
        const data = JSON.parse(event.data);
        
        if (data.state === "idle") {
            micBtn.classList.remove('listening');
            statusText.innerText = "系统就绪，待命中...";
            statusDot.style.backgroundColor = "#10B981";
        } 
        else if (data.state === "listening") {
            micBtn.classList.add('listening');
            statusText.innerText = "正在聆听主人指令...";
            statusDot.style.backgroundColor = "#F59E0B";
        }
        else if (data.state === "thinking") {
            micBtn.classList.remove('listening');
            statusText.innerText = "Alexa 思考中...";
            statusDot.style.backgroundColor = "#8B5CF6";
        }
        else if (data.state === "user_said") {
            // 用户说话气泡（右侧紫色）
            addMessage(data.text, "user");
        }
        else if (data.state === "replying") {
            // 兼容旧协议：非流式整句推送
            addMessage(data.text, "alexa");
            statusText.innerText = "Alexa 正在回答...";
        }
        // ✅ 新增：处理流式打字协议
        else if (data.state === "typing_start") {
            // 创建一个空的 Alexa 气泡，准备逐字填入
            alexaTypingBubble = document.createElement('div');
            alexaTypingBubble.classList.add('bubble', 'alexa');
            alexaTypingBubble.innerText = "";
            chatArea.appendChild(alexaTypingBubble);
            chatArea.scrollTop = chatArea.scrollHeight;
            statusText.innerText = "Alexa 正在回答...";
            statusDot.style.backgroundColor = "#8B5CF6";
        }
        else if (data.state === "typing_word") {
            // 将新词追加到现有气泡中，实现流式打字效果
            if (alexaTypingBubble) {
                alexaTypingBubble.innerText += data.text;
                chatArea.scrollTop = chatArea.scrollHeight;
            }
        }
        else if (data.state === "typing_end") {
            // 打字结束，重置气泡引用
            alexaTypingBubble = null;
            statusText.innerText = "系统就绪，待命中...";
            statusDot.style.backgroundColor = "#10B981";
        }
    };

    function addMessage(text, sender) {
        const bubble = document.createElement('div');
        bubble.classList.add('bubble', sender);
        bubble.innerText = text;
        chatArea.appendChild(bubble);
        chatArea.scrollTop = chatArea.scrollHeight;
    }
</script>
    </script>
</body>
</html>
